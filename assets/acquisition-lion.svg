<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Leão Cevora Acquisition OS</title>
  <desc id="desc">Leão de obsidiana com detalhes dourados e rubis, símbolo de comando e direção estratégica.</desc>
  <defs>
    <radialGradient id="halo" cx="50%" cy="45%" r="58%">
      <stop offset="0" stop-color="#6f0f1b" stop-opacity=".9"/>
      <stop offset=".38" stop-color="#2b080d" stop-opacity=".78"/>
      <stop offset="1" stop-color="#050403" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#765020"/>
      <stop offset=".22" stop-color="#f3d38d"/>
      <stop offset=".48" stop-color="#b87a30"/>
      <stop offset=".72" stop-color="#f1c873"/>
      <stop offset="1" stop-color="#694317"/>
    </linearGradient>
    <linearGradient id="black" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#302820"/>
      <stop offset=".23" stop-color="#080706"/>
      <stop offset=".55" stop-color="#1d1713"/>
      <stop offset=".8" stop-color="#030303"/>
      <stop offset="1" stop-color="#2a2119"/>
    </linearGradient>
    <radialGradient id="ruby" cx="35%" cy="25%" r="70%">
      <stop offset="0" stop-color="#ff7b83"/>
      <stop offset=".2" stop-color="#bd2637"/>
      <stop offset=".62" stop-color="#620812"/>
      <stop offset="1" stop-color="#220306"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#000" flood-opacity=".75"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#d8ad5f" flood-opacity=".18"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="engrave" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M0 22C10 8 14 8 22 22s12 14 22 0" fill="none" stroke="#d8ad5f" stroke-opacity=".12" stroke-width="1"/>
      <path d="M22 0C8 10 8 14 22 22s14 12 0 22" fill="none" stroke="#d8ad5f" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
  </defs>

  <circle cx="600" cy="530" r="460" fill="url(#halo)"/>
  <circle cx="600" cy="515" r="420" fill="none" stroke="url(#gold)" stroke-width="10" opacity=".82" filter="url(#glow)"/>
  <circle cx="600" cy="515" r="374" fill="#120807" stroke="#d8ad5f" stroke-opacity=".4" stroke-width="2"/>
  <circle cx="600" cy="515" r="342" fill="url(#engrave)" stroke="#8f6227" stroke-width="2" opacity=".85"/>
  <g fill="none" stroke="#d8ad5f" stroke-opacity=".24">
    <circle cx="600" cy="515" r="310"/>
    <circle cx="600" cy="515" r="265" stroke-dasharray="4 15"/>
    <path d="M600 144v742M229 515h742M337 252l526 526M863 252 337 778"/>
  </g>

  <g filter="url(#shadow)">
    <!-- crown -->
    <path d="M423 255 470 145 544 224 600 112 656 224 730 145 777 255 744 320H456Z" fill="url(#gold)" stroke="#f4d58c" stroke-width="5"/>
    <path d="M451 250h298l-18 70H469Z" fill="#6f0f1b" stroke="url(#gold)" stroke-width="8"/>
    <g fill="url(#ruby)" stroke="#f1cc82" stroke-width="4">
      <circle cx="485" cy="260" r="15"/><circle cx="545" cy="250" r="13"/><circle cx="600" cy="238" r="17"/><circle cx="655" cy="250" r="13"/><circle cx="715" cy="260" r="15"/>
    </g>

    <!-- mane silhouette -->
    <path d="M600 278c-100-57-214-18-277 60-57 71-69 165-42 251-45 91-17 198 61 257 29 87 114 143 204 137 34 26 74 39 114 39s80-13 114-39c90 6 175-50 204-137 78-59 106-166 61-257 27-86 15-180-42-251-63-78-177-117-277-60-36-20-84-20-120 0Z" fill="url(#black)" stroke="url(#gold)" stroke-width="11"/>
    <path d="M600 302c-60-42-129-37-176-3 32 9 58 25 77 48-64-23-126-7-167 31 36 4 68 18 93 40-76-4-134 33-157 78 40-8 75-2 103 15-73 22-113 75-119 128 34-20 69-27 102-21-60 48-76 112-59 162 24-29 53-48 86-55-38 68-20 132 17 165 12-36 33-64 63-82-10 75 30 127 76 142 0-36 14-67 38-93 14 62 60 103 103 111 43-8 89-49 103-111 24 26 38 57 38 93 46-15 86-67 76-142 30 18 51 46 63 82 37-33 55-97 17-165 33 7 62 26 86 55 17-50 1-114-59-162 33-6 68 1 102 21-6-53-46-106-119-128 28-17 63-23 103-15-23-45-81-82-157-78 25-22 57-36 93-40-41-38-103-54-167-31 19-23 45-39 77-48-47-34-116-39-176 3Z" fill="url(#engrave)" opacity=".82"/>

    <!-- head -->
    <path d="M438 419c28-86 93-130 162-130s134 44 162 130l-11 174c-7 101-71 184-151 184s-144-83-151-184Z" fill="url(#black)" stroke="url(#gold)" stroke-width="8"/>
    <path d="M450 414 393 346c-9-12 1-31 17-28l94 20M750 414l57-68c9-12-1-31-17-28l-94 20" fill="#080706" stroke="url(#gold)" stroke-width="8"/>
    <path d="M468 401c38-32 77-42 116-25M732 401c-38-32-77-42-116-25" fill="none" stroke="#e7bd69" stroke-width="12" stroke-linecap="round"/>
    <path d="M486 455c32-23 65-21 91 5-30 9-59 8-91-5ZM714 455c-32-23-65-21-91 5 30 9 59 8 91-5Z" fill="#d8ad5f" opacity=".9"/>
    <ellipse cx="535" cy="450" rx="13" ry="18" fill="#050403"/>
    <ellipse cx="665" cy="450" rx="13" ry="18" fill="#050403"/>
    <path d="M547 565c24-24 82-24 106 0l-12 34c-11 23-71 23-82 0Z" fill="#100b08" stroke="url(#gold)" stroke-width="7"/>
    <path d="M600 602v45M600 647c-30 0-52 10-70 28M600 647c30 0 52 10 70 28" fill="none" stroke="#d8ad5f" stroke-width="7" stroke-linecap="round"/>
    <path d="M500 530c-55 15-94 36-129 67M700 530c55 15 94 36 129 67M493 553c-56 29-84 52-109 83M707 553c56 29 84 52 109 83" fill="none" stroke="#d8ad5f" stroke-opacity=".72" stroke-width="4"/>

    <!-- chest jewel -->
    <path d="M453 760c42 95 95 143 147 143s105-48 147-143l-61-58H514Z" fill="#070605" stroke="url(#gold)" stroke-width="8"/>
    <circle cx="600" cy="767" r="62" fill="url(#gold)"/>
    <circle cx="600" cy="767" r="44" fill="url(#ruby)" stroke="#f3d58c" stroke-width="5"/>
    <path d="m600 720 22 32 39 9-25 30 3 40-39-15-39 15 3-40-25-30 39-9Z" fill="#7e111e" opacity=".7"/>

    <!-- base and globe -->
    <ellipse cx="600" cy="1008" rx="326" ry="78" fill="#080706" stroke="url(#gold)" stroke-width="11"/>
    <path d="M300 976h600v89H300Z" fill="url(#black)" stroke="url(#gold)" stroke-width="8"/>
    <path d="M350 1013h500" stroke="#d8ad5f" stroke-opacity=".38" stroke-width="3" stroke-dasharray="8 15"/>
    <circle cx="404" cy="900" r="108" fill="#0b0907" stroke="url(#gold)" stroke-width="9"/>
    <path d="M354 849c44-30 83-32 125-7-20 13-30 35-26 66-27-16-56-19-88-8 2-23-2-39-11-51ZM375 932c30 16 63 18 101 4" fill="none" stroke="#d8ad5f" stroke-width="6"/>
    <path d="M493 830c-30 13-52 40-68 81" fill="none" stroke="#d8ad5f" stroke-width="9" stroke-linecap="round"/>
    <path d="M439 833c-11-19-21-35-31-48" stroke="#d8ad5f" stroke-width="10" stroke-linecap="round"/>

    <!-- crest -->
    <path d="M600 980 684 1016 668 1098 600 1140 532 1098 516 1016Z" fill="#090705" stroke="url(#gold)" stroke-width="8"/>
    <path d="M628 1030c-39-31-79-8-79 31 0 40 42 60 81 29-17 5-43-5-43-31 0-23 22-34 41-29Z" fill="url(#gold)"/>
  </g>

  <g fill="#f1cc82" filter="url(#glow)">
    <circle cx="179" cy="380" r="5"/><circle cx="1020" cy="372" r="5"/><circle cx="209" cy="747" r="4"/><circle cx="995" cy="735" r="4"/>
  </g>
</svg>