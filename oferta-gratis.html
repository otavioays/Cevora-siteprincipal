<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#090706" />
  <meta name="description" content="Condição especial Cevora para clínicas selecionadas." />
  <title>Oferta Especial | Cevora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #090706;
      --panel: rgba(17, 12, 9, .74);
      --cream: #f1eadf;
      --muted: rgba(241, 234, 223, .55);
      --gold: #d8ad5f;
      --gold-bright: #f0cc82;
      --red: #7d111d;
      --red-bright: #b62737;
    }

    * { box-sizing: border-box; }

    html { background: var(--bg); }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--cream);
      background:
        radial-gradient(circle at 18% 22%, rgba(125, 17, 29, .2), transparent 34%),
        radial-gradient(circle at 82% 76%, rgba(216, 173, 95, .08), transparent 34%),
        linear-gradient(rgba(216, 173, 95, .025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(216, 173, 95, .025) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, 34px 34px, 34px 34px, auto;
      font-family: "Manrope", sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .5;
      background: repeating-linear-gradient(-45deg, transparent 0 12px, rgba(255,255,255,.01) 12px 13px);
    }

    .offer-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .offer-header {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
      padding: 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid rgba(216, 173, 95, .14);
    }

    .offer-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--cream);
      text-decoration: none;
    }

    .offer-brand__mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(240, 204, 130, .4);
      border-radius: 50%;
      color: var(--gold-bright);
      background: rgba(11, 8, 6, .66);
      box-shadow: 0 0 24px rgba(125, 17, 29, .16);
      font-family: "Cormorant Garamond", serif;
      font-size: 18px;
    }

    .offer-brand strong {
      font-family: "Cormorant Garamond", serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: .02em;
    }

    .offer-header__status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(240, 204, 130, .66);
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .offer-header__status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red-bright);
      box-shadow: 0 0 14px rgba(182, 39, 55, .72);
    }

    .offer-stage {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
      padding: clamp(70px, 10vw, 140px) 0;
      display: grid;
      place-items: center;
    }

    .offer-shell {
      position: relative;
      width: min(880px, 100%);
      min-height: 420px;
      padding: clamp(34px, 6vw, 72px);
      display: grid;
      place-items: center;
      text-align: center;
      overflow: hidden;
      border: 1px solid rgba(216, 173, 95, .28);
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(24, 17, 12, .8), rgba(7, 5, 4, .92)),
        repeating-linear-gradient(-45deg, transparent 0 10px, rgba(255,255,255,.012) 10px 11px);
      backdrop-filter: blur(22px) saturate(126%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        inset 0 0 60px rgba(0,0,0,.44),
        0 30px 90px rgba(0,0,0,.48),
        0 0 54px rgba(125,17,29,.12);
    }

    .offer-shell::before {
      content: "";
      position: absolute;
      inset: 12px;
      pointer-events: none;
      border: 1px solid rgba(216, 173, 95, .08);
      border-radius: 20px;
    }

    .offer-shell::after {
      content: "";
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(182,39,55,.17), transparent 68%);
      filter: blur(12px);
      pointer-events: none;
    }

    .offer-placeholder {
      position: relative;
      z-index: 1;
      max-width: 620px;
    }

    .offer-placeholder__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: rgba(240, 204, 130, .7);
      font-size: 9px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .offer-placeholder__eyebrow::before,
    .offer-placeholder__eyebrow::after {
      content: "";
      width: 42px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(216,173,95,.42));
    }

    .offer-placeholder__eyebrow::after {
      transform: scaleX(-1);
    }

    .offer-placeholder h1 {
      margin: 0;
      color: var(--cream);
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(44px, 8vw, 82px);
      font-weight: 500;
      line-height: .94;
      letter-spacing: -.035em;
    }

    .offer-placeholder h1 strong {
      display: block;
      color: var(--gold-bright);
      font-weight: 600;
      text-shadow: 0 0 28px rgba(240, 204, 130, .16);
    }

    .offer-placeholder p {
      margin: 24px auto 0;
      max-width: 520px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .offer-header {
        width: min(100% - 24px, 1180px);
        padding: 18px 0;
      }

      .offer-header__status { display: none; }

      .offer-stage {
        width: min(100% - 20px, 1180px);
        padding: 44px 0;
      }

      .offer-shell {
        min-height: 360px;
        padding: 28px 20px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="offer-page">
    <header class="offer-header">
      <a class="offer-brand" href="index.html" aria-label="Voltar para a página principal da Cevora">
        <span class="offer-brand__mark" aria-hidden="true">C</span>
        <strong>Cevora</strong>
      </a>
      <span class="offer-header__status">Condição especial</span>
    </header>

    <main class="offer-stage">
      <section class="offer-shell" aria-labelledby="offerPageTitle">
        <div class="offer-placeholder">
          <span class="offer-placeholder__eyebrow">Oferta exclusiva</span>
          <h1 id="offerPageTitle">Página em <strong>construção</strong></h1>
          <p>Esta página já está conectada ao CTA principal e pronta para receber a próxima etapa da oferta.</p>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
